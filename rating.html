<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đánh giá + Bình luận</title>

<style>
body { font-family: Arial; text-align: center; background: #f2f2f2; }
.box { margin: 30px auto; padding: 20px; width: 350px; background: white; border-radius: 10px; }
.stars span { font-size: 30px; cursor: pointer; color: gray; }
.stars span.active { color: gold; }
textarea, input { width: 90%; margin: 5px; padding: 8px; }
button { padding: 10px; background: green; color: white; border: none; }
.comment { text-align: left; margin-top: 10px; border-top: 1px solid #ccc; padding-top: 5px; }
</style>

</head>
<body>

<div class="box">
<h2>⭐ Đánh giá</h2>

<div class="stars">
<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>
</div>

<p id="text">Chưa chọn</p>
<button onclick="sendRating()">Gửi đánh giá</button>

<hr>

<h3>💬 Bình luận</h3>

<input id="name" placeholder="Tên bạn">
<textarea id="comment" placeholder="Nhập bình luận"></textarea>
<button onclick="sendComment()">Gửi</button>

<div id="list"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔴 DÁN CONFIG CỦA BẠN VÀO ĐÂY
const firebaseConfig = {
  apiKey: "AIzaSyBJYx1pCyLgdnYkBoXRC8dfgY4xJ7vkeNQ",
    authDomain: "nhan-a975e.firebaseapp.com",
    projectId: "nhan-a975e",
    storageBucket: "nhan-a975e.firebasestorage.app",
    messagingSenderId: "442490879373",
    appId: "1:442490879373:web:c750df4a29d5fb530711c4",
    measurementId: "G-QT7VZ2SZGY"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let selected = 0;

window.rate = function(n){
    selected = n;
    document.querySelectorAll(".stars span")
        .forEach((s,i)=> s.classList.toggle("active", i < n));
    document.getElementById("text").innerText = "Bạn chọn " + n + " sao";
}

window.sendRating = function(){
    if(selected === 0) return alert("Chọn sao!");
    push(ref(db,"ratings"), { star: selected });
    alert("Đã gửi!");
}

window.sendComment = function(){
    let name = document.getElementById("name").value;
    let text = document.getElementById("comment").value;

    if(name==""||text=="") return alert("Nhập đủ!");

    push(ref(db,"comments"), { name, text });

    document.getElementById("name").value="";
    document.getElementById("comment").value="";
}

// realtime load
onValue(ref(db,"comments"), snap=>{
    let data = snap.val();
    let list = document.getElementById("list");
    list.innerHTML = "";

    if(!data) return;

    Object.values(data).reverse().forEach(c=>{
        list.innerHTML += `<div class="comment"><b>${c.name}</b>: ${c.text}</div>`;
    });
});
</script>

</body>
</html>
</html>
